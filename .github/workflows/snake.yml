name: snake

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  snake:
    runs-on: ubuntu-latest

    steps:
      - name: Generate snake
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: soham-1902
          github_token: ${{ secrets.GITHUB_TOKEN }}
          outputs: |
            dist/snake.svg?color_snake=#00ffe0&color_dots=#050c18,#002828,#004040,#006060,#00ffe0

      - name: Push to output branch
        uses: crazy-max/ghaction-github-pages@v3
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}